<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Interactive Terminal - Record Tutorials</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0d0d0d;
            color: #00ff00;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #ff006e;
            font-weight: bold;
        }
        
        .header h1 {
            font-size: 1.5em;
            margin-bottom: 5px;
        }
        
        .terminal-window {
            background: #1a1a1a;
            border: 2px solid #00ff00;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            flex: 1;
            max-height: calc(100vh - 200px);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }
        
        .terminal-header {
            background: #2a2a2a;
            padding: 10px 15px;
            border-bottom: 1px solid #00ff00;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .terminal-title {
            color: #00ff00;
            font-weight: bold;
        }
        
        .terminal-buttons {
            display: flex;
            gap: 10px;
        }
        
        .terminal-buttons button {
            background: rgba(255, 0, 110, 0.2);
            color: #ff006e;
            border: 1px solid #ff006e;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .terminal-buttons button:active {
            opacity: 0.7;
        }
        
        .terminal-output {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #0d0d0d;
            display: flex;
            flex-direction: column;
        }
        
        .terminal-line {
            margin-bottom: 8px;
            line-height: 1.5;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .prompt {
            color: #00ff00;
            font-weight: bold;
        }
        
        .command {
            color: #ffff00;
        }
        
        .output {
            color: #00ff00;
            opacity: 0.9;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .error {
            color: #ff6b6b;
        }
        
        .input-line {
            display: flex;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid #333;
        }
        
        .input-prompt {
            color: #00ff00;
            font-weight: bold;
            margin-right: 10px;
            flex-shrink: 0;
        }
        
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #ffff00;
            font-family: 'Courier New', monospace;
            font-size: 1em;
            outline: none;
        }
        
        input::placeholder {
            color: #555;
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .controls button {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }
        
        .controls button:active {
            opacity: 0.8;
        }
        
        .secondary-btn {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
            border: 1px solid #00ff00;
        }
        
        .help-text {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .terminal-window {
                max-height: calc(100vh - 150px);
            }
            
            .header h1 {
                font-size: 1.2em;
            }
            
            .terminal-output {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖥️ Interactive Terminal</h1>
        <p>Record tutorial videos - Type real commands</p>
    </div>
    
    <div class="terminal-window">
        <div class="terminal-header">
            <span class="terminal-title">Terminal — bash</span>
            <div class="terminal-buttons">
                <button onclick="clearTerminal()">Clear</button>
            </div>
        </div>
        
        <div class="terminal-output" id="output"></div>
        
        <div class="input-line">
            <span class="input-prompt">$</span>
            <input 
                type="text" 
                id="input" 
                placeholder="Type a command..."
                autocomplete="off"
            >
        </div>
    </div>
    
    <div class="controls">
        <button onclick="insertCommand('ollama --version')">ollama --version</button>
        <button onclick="insertCommand('ollama list')">ollama list</button>
        <button onclick="insertCommand('ollama pull llama-3.1-8b-instant')">ollama pull llama-3.1-8b-instant</button>
        <button onclick="insertCommand('ollama run llama-3.1-8b-instant')">ollama run llama-3.1-8b-instant</button>
        <button class="secondary-btn" onclick="copyAllOutput()">Copy Output</button>
    </div>
    
    <div class="help-text">
        💡 Type commands or click buttons. Use arrow keys for command history.
    </div>

    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('input');
        let commandHistory = [];
        let historyIndex = -1;
        
        // Command responses
        const responses = {
            'ollama --version': 'ollama version is 0.3.11',
            'ollama list': `NAME                          ID              SIZE      MODIFIED
llama-3.1-8b-instant         e5905f1e7c04    4.7 GB    2 minutes ago
llama-3.3-70b-versatile      8ddc3c5f4a08    45 GB     5 minutes ago
phi-2                        6c4c9b8e3d2f    2.8 GB    1 hour ago`,
            'ollama pull llama-3.1-8b-instant': `pulling manifest
pulling 2e405bbf...
pulling 1f7b...
pulling ede...
pulling c41...
pulling 24fc...
verifying sha256 digest
writing manifest
removing any unused layers
success`,
            'ollama run llama-3.1-8b-instant': `>>> What is machine learning?
Machine learning is a subset of artificial intelligence that enables
computer systems to learn and improve from experience without being 
explicitly programmed. It uses algorithms to analyze data, identify 
patterns, and make decisions with minimal human intervention.

Key concepts:
• Supervised learning: training with labeled data
• Unsupervised learning: finding patterns in unlabeled data
• Reinforcement learning: learning through rewards and penalties

>>> Send a message (/help for help)`,
            'ollama serve': `time=2026-06-19T14:32:45.123Z level=INFO source=main.go:104 msg="Listening on 127.0.0.1:11434"
time=2026-06-19T14:32:45.456Z level=INFO source=server.go:312 msg="Loaded dynamic library"
Ollama is running on http://localhost:11434`,
            'ls': `Applications
Desktop
Documents
Downloads
Library
Movies
Music
Pictures
Public`,
            'cd ollama': '',
            'pwd': '/Users/yourname/ollama',
            'python --version': 'Python 3.11.7',
            'pip install ollama': `Collecting ollama
  Downloading ollama-0.1.25-py3-none-any.whl
Installing collected packages: ollama
Successfully installed ollama-0.1.25`,
            'help': `Available Ollama Commands:
ollama list           - List all downloaded models
ollama pull <model>   - Download a model
ollama run <model>    - Run a model interactively
ollama serve          - Start the Ollama server
ollama rm <model>     - Remove a model
ollama show <model>   - Show model details
ollama create <name>  - Create a new model`,
            'clear': 'CLEAR'
        };
        
        function addLine(promptText, commandText = '', outputText = '', isError = false) {
            const line = document.createElement('div');
            line.className = 'terminal-line';
            
            if (commandText !== undefined && commandText !== null) {
                const html = `<span class="prompt">${promptText}</span><span class="command">${commandText}</span>`;
                line.innerHTML = html;
                output.appendChild(line);
            }
            
            if (outputText) {
                const outputLine = document.createElement('div');
                outputLine.className = `terminal-line ${isError ? 'error' : ''}`;
                const outputHtml = `<span class="output">${outputText}</span>`;
                outputLine.innerHTML = outputHtml;
                output.appendChild(outputLine);
            }
            
            output.scrollTop = output.scrollHeight;
        }
        
        function processCommand(cmd) {
            const trimmed = cmd.trim();
            
            if (!trimmed) return;
            
            // Add to history
            commandHistory.unshift(trimmed);
            historyIndex = -1;
            
            // Display command
            addLine('$ ', trimmed);
            
            // Check for clear
            if (trimmed === 'clear') {
                output.innerHTML = '';
                input.value = '';
                return;
            }
            
            // Get response
            const response = responses[trimmed] || `Command not found: ${trimmed}. Type 'help' for available commands.`;
            const isError = !responses[trimmed];
            
            addLine('', response, '', isError);
            input.value = '';
        }
        
        function clearTerminal() {
            output.innerHTML = '';
            input.value = '';
        }
        
        function insertCommand(cmd) {
            input.value = cmd;
            input.focus();
        }
        
        function copyAllOutput() {
            const text = Array.from(output.querySelectorAll('.terminal-line'))
                .map(line => line.textContent)
                .join('\n');
            navigator.clipboard.writeText(text);
            alert('✓ Output copied to clipboard');
        }
        
        // Input handling
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                processCommand(input.value);
            }
        });
        
        // Command history navigation
        input.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (historyIndex < commandHistory.length - 1) {
                    historyIndex++;
                    input.value = commandHistory[historyIndex];
                }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = commandHistory[historyIndex];
                } else if (historyIndex === 0) {
                    historyIndex = -1;
                    input.value = '';
                }
            }
        });
        
        // Welcome message
        window.addEventListener('load', () => {
            addLine('$ ', 'Welcome to Interactive Terminal');
            addLine('', 'Type commands to learn Ollama installation', '');
            addLine('', 'Press arrow keys to navigate history', '');
            addLine('', 'Type "help" for available commands', '');
            input.focus();
        });
    </script>
</body>
</html>
